server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Statische Assets cachen (Hintergrundbild)
    location ~* \.(jpg|jpeg|png|gif|ico|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        try_files $uri /index.html;
    }
}
