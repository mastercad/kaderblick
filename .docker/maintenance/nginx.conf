server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # API-Domains (api.kaderblick.de, staging-api.kaderblick.de) geben JSON zurück
    # Erkennnung via Host-Header, den Plesk-Nginx beim Proxy-Pass durchreicht
    set $is_api 0;
    if ($http_host ~* "^(staging-)?api\.") {
        set $is_api 1;
    }

    location / {
        if ($is_api = 1) {
            add_header Content-Type "application/json; charset=utf-8";
            return 503 '{"error":"service_unavailable","message":"The API is currently undergoing maintenance. Please try again shortly."}';
        }

        try_files $uri /index.html;
    }

    # Statische Assets cachen (Hintergrundbild)
    location ~* \.(jpg|jpeg|png|gif|ico|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }
}
