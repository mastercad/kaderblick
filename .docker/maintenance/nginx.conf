# API-Domains (api.kaderblick.de, staging-api.kaderblick.de) → JSON
server {
    listen 80;
    server_name ~^(staging-)?api\.;

    location / {
        types { }
        default_type "application/json; charset=utf-8";
        return 503 '{"error":"service_unavailable","message":"The API is currently undergoing maintenance. Please try again shortly."}';
    }
}

# Alle anderen Domains (kaderblick.de, staging.kaderblick.de) → HTML-Wartungsseite
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Statische Assets cachen (Hintergrundbild)
    location ~* \.(jpg|jpeg|png|gif|ico|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }
}
