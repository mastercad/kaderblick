name: Pull Request Checks

# Läuft bei jedem Pull Request:
# 1. Images aus dem PR-Branch bauen und nach GHCR pushen
# 2. QA gegen exakt diese Images ausführen (keine lokalen Builds)
# Kein Deploy.

on:
  pull_request:

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:

  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write

  quality-assurance:
    needs: build
    uses: ./.github/workflows/qa.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
      packages: read
    with:
      image_tag: ${{ github.sha }}
      is_pull_request: true
