name: Build Docker Images

# Reusable workflow: baut alle Docker-Images und pusht sie nach GHCR.
# Wird von ci.yml aufgerufen, bevor QA und Deploy-Jobs starten.
#
# Strategie bei unverändertem Code:
#   Wenn sich ein Bereich (api/, frontend/, .docker/) nicht geändert hat,
#   wird das bestehende 'latest'-Image nur neu getaggt (~Sekunden statt Minuten).
#   Dadurch hat jeder Commit einen eindeutigen SHA-Tag, ohne unnötige Builds.

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build-Metadaten ins Frontend einbetten (Publish-Datum, Build-Info)
      - name: Prepare build metadata
        run: |
          sh ./frontend/scripts/set-publish-date.sh
          sh ./frontend/scripts/write-buildinfo.sh

      - name: Build and push API image
        run: |
          docker buildx build \
            --cache-from type=gha,scope=api \
            --cache-to   type=gha,mode=max,scope=api \
            -f .docker/api/Dockerfile \
            -t ghcr.io/mastercad/kaderblick/api:${{ github.sha }} \
            -t ghcr.io/mastercad/kaderblick/api:latest \
            --push .

      - name: Build and push frontend-prod image
        run: |
          echo "VITE_BACKEND_URL=https://api.kaderblick.de" > frontend/.env
          docker buildx build \
            --cache-from type=gha,scope=frontend \
            --cache-to   type=gha,mode=max,scope=frontend \
            -f .docker/frontend/Dockerfile \
            -t ghcr.io/mastercad/kaderblick/frontend-prod:${{ github.sha }} \
            -t ghcr.io/mastercad/kaderblick/frontend-prod:latest \
            --push .

      - name: Build and push frontend-staging image
        run: |
          echo "VITE_BACKEND_URL=https://staging-api.kaderblick.de" > frontend/.env
          docker buildx build \
            --cache-from type=gha,scope=frontend \
            --cache-to   type=gha,mode=max,scope=frontend \
            -f .docker/frontend/Dockerfile \
            -t ghcr.io/mastercad/kaderblick/frontend-staging:${{ github.sha }} \
            -t ghcr.io/mastercad/kaderblick/frontend-staging:latest \
            --push .
          rm -f frontend/.env

      - name: Build and push maintenance image
        run: |
          docker buildx build \
            --cache-from type=gha,scope=maintenance \
            --cache-to   type=gha,mode=max,scope=maintenance \
            -f .docker/maintenance/Dockerfile \
            -t ghcr.io/mastercad/kaderblick/maintenance:${{ github.sha }} \
            -t ghcr.io/mastercad/kaderblick/maintenance:latest \
            --push .

      # Prüfen welche Packages bereits in GHCR existieren, bevor Cleanup läuft.
      # Verhindert "Package not found"-Annotations wenn ein Package noch nie gepusht wurde.
      - name: Check which GHCR packages exist
        if: always()
        id: pkg_check
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          pkg_exists() {
            gh api "users/mastercad/packages/container/$(echo "$1" | sed 's|/|%2F|g')" --silent 2>/dev/null && echo "true" || echo "false"
          }
          echo "api=$(pkg_exists 'kaderblick/api')"                         >> $GITHUB_OUTPUT
          echo "frontend_prod=$(pkg_exists 'kaderblick/frontend-prod')"     >> $GITHUB_OUTPUT
          echo "frontend_staging=$(pkg_exists 'kaderblick/frontend-staging')" >> $GITHUB_OUTPUT
          echo "maintenance=$(pkg_exists 'kaderblick/maintenance')"         >> $GITHUB_OUTPUT

      # Alte GHCR-Images aufräumen (letzte 5 behalten, 'latest' nie löschen)
      - name: Cleanup old GHCR images (api)
        if: always() && steps.pkg_check.outputs.api == 'true'
        uses: actions/delete-package-versions@v5
        with:
          package-name: kaderblick/api
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: latest

      - name: Cleanup old GHCR images (frontend-prod)
        if: always() && steps.pkg_check.outputs.frontend_prod == 'true'
        uses: actions/delete-package-versions@v5
        with:
          package-name: kaderblick/frontend-prod
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: latest

      - name: Cleanup old GHCR images (frontend-staging)
        if: always() && steps.pkg_check.outputs.frontend_staging == 'true'
        uses: actions/delete-package-versions@v5
        with:
          package-name: kaderblick/frontend-staging
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: latest

      - name: Cleanup old GHCR images (maintenance)
        if: always() && steps.pkg_check.outputs.maintenance == 'true'
        uses: actions/delete-package-versions@v5
        with:
          package-name: kaderblick/maintenance
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: latest
