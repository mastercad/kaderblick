name: Deploy to Server

# Reusable workflow: deployt die bereits in GHCR vorhandenen Images auf den Server.
# Wird von ci.yml aufgerufen, nachdem Build und QA erfolgreich waren.
#
# Reihenfolge:
#   1. Release-Verzeichnisse vorbereiten (Compose-Dateien, Configs, Secrets)
#   2. DB + Maintenance-Container sicherstellen
#   3. Production: Maintenance an → Deploy → Migrate → Healthcheck → Maintenance aus
#   4. Production-DB → Staging klonen
#   5. Staging: Maintenance an → Deploy → Migrate → Maintenance aus
#   6. Cleanup alter Releases
#
# Bei Fehler: automatischer Rollback auf das letzte bekannte Production-Release.

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        type: string
        default: 'latest'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        type: string
        default: 'latest'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ============================================================
      # VORBEREITUNG: Release-Verzeichnisse und Dateien
      # ============================================================

      - name: Generate release directory names
        id: release
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          echo "prod_dir=${{ secrets.MAIN_PROJECT_PATH }}/production_releases/$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "staging_dir=${{ secrets.MAIN_PROJECT_PATH }}/staging_releases/$TIMESTAMP" >> $GITHUB_OUTPUT

      # Nur docker-compose-Dateien + minimale Config auf den Server kopieren.
      # Source-Code und vendor/ stecken im Docker-Image – nicht nötig auf dem Server.
      - name: Prepare release files locally
        run: |
          mkdir -p build/api/config build/frontend
          cp docker-compose.yml docker-compose.staging.yml docker-compose.db.yml docker-compose.maintenance.yml build/
          cp -r .docker build/
          cp api/.env.dist build/api/
          cp -r api/config/packages api/config/routes api/config/routes.yaml \
                api/config/services.yaml api/config/bundles.php build/api/config/ 2>/dev/null || true
          # Verschlüsselte Secrets mitkopieren – Volume-Mount würde sonst das Image-Verzeichnis
          # overlayen und secrets:decrypt-to-local findet keine Quelldateien mehr.
          cp -r api/config/secrets build/api/config/ 2>/dev/null || true

      - name: Create production release directory on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            mkdir -p "${{ steps.release.outputs.prod_dir }}"
            chmod 755 "${{ steps.release.outputs.prod_dir }}"
            chown -R ${{ secrets.PLESK_USERNAME }}:psacln "${{ steps.release.outputs.prod_dir }}"

      - name: Copy release files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USERNAME }}
          password: ${{ secrets.PLESK_PASSWORD }}
          source: "build/*"
          target: "${{ steps.release.outputs.prod_dir }}"
          strip_components: 1

      - name: Create staging release directory on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            mkdir -p "${{ secrets.MAIN_PROJECT_PATH }}/staging_releases"
            cp -r "${{ steps.release.outputs.prod_dir }}" "${{ steps.release.outputs.staging_dir }}"
            chmod 755 "${{ steps.release.outputs.staging_dir }}"
            chown -R ${{ secrets.PLESK_USERNAME }}:psacln "${{ steps.release.outputs.staging_dir }}"

      - name: Deploy JWT keys
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            ROOT_DIR="${{ secrets.MAIN_PROJECT_PATH }}"
            for DIR in "${{ steps.release.outputs.prod_dir }}" "${{ steps.release.outputs.staging_dir }}"; do
              mkdir -p "$DIR/api/config/jwt"
              if [ -d "$ROOT_DIR/api/config/jwt" ]; then
                cp -r "$ROOT_DIR/api/config/jwt/"* "$DIR/api/config/jwt/" 2>/dev/null || true
              fi
              chown -R kaderblick-ftp-admin:psacln "$DIR"
            done

      - name: Write .env and decrypt keys
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            PROD_DIR="${{ steps.release.outputs.prod_dir }}"
            STAGING_DIR="${{ steps.release.outputs.staging_dir }}"

            # --- Production ---
            cp "$PROD_DIR/api/.env.dist" "$PROD_DIR/api/.env"
            sed -i 's/^APP_ENV=.*$/APP_ENV=prod/'  "$PROD_DIR/api/.env"
            echo "APP_DEBUG=0"                           >> "$PROD_DIR/api/.env"
            echo "APP_SECRET=${{ secrets.APP_SECRET }}"  >> "$PROD_DIR/api/.env"
            mkdir -p "$PROD_DIR/api/config/secrets/prod"
            echo '${{ secrets.PROD_DECRYPT_KEY }}' | base64 -d \
              > "$PROD_DIR/api/config/secrets/prod/prod.decrypt.private.php"
            chmod 655 "$PROD_DIR/api/config/secrets/prod/prod.decrypt.private.php"
            echo "VITE_BACKEND_URL=https://api.kaderblick.de" > "$PROD_DIR/frontend/.env"

            # --- Staging ---
            cp "$STAGING_DIR/api/.env.dist" "$STAGING_DIR/api/.env"
            sed -i 's/^APP_ENV=.*$/APP_ENV=staging/' "$STAGING_DIR/api/.env"
            sed -i 's|^GOOGLE_REDIRECT_URI=.*$|GOOGLE_REDIRECT_URI=https://staging.kaderblick.de/oauth2callback|' "$STAGING_DIR/api/.env"
            sed -i 's|^FRONTEND_URL=.*$|FRONTEND_URL=https://staging.kaderblick.de|' "$STAGING_DIR/api/.env"
            echo "APP_DEBUG=0"                           >> "$STAGING_DIR/api/.env"
            echo "APP_SECRET=${{ secrets.APP_SECRET }}"  >> "$STAGING_DIR/api/.env"
            mkdir -p "$STAGING_DIR/api/config/secrets/staging"
            echo '${{ secrets.STAGING_DECRYPT_KEY }}' | base64 -d \
              > "$STAGING_DIR/api/config/secrets/staging/staging.decrypt.private.php"
            chmod 655 "$STAGING_DIR/api/config/secrets/staging/staging.decrypt.private.php"
            echo "VITE_BACKEND_URL=https://staging-api.kaderblick.de" > "$STAGING_DIR/frontend/.env"

      - name: Prepare shared uploads symlinks
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            SHARED="${{ secrets.MAIN_PROJECT_PATH }}/public/uploads"
            mkdir -p "$SHARED"
            chown -R www-data:www-data "$SHARED"
            chmod -R 775 "$SHARED"
            for DIR in "${{ steps.release.outputs.prod_dir }}" "${{ steps.release.outputs.staging_dir }}"; do
              mkdir -p "$DIR/public"
              rm -rf "$DIR/public/uploads"
              ln -s "$SHARED" "$DIR/public/uploads"
            done

      # ============================================================
      # INFRASTRUKTUR: DB + Maintenance-Container
      # ============================================================

      - name: Ensure DB container is running
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            docker network inspect kaderblick-net    >/dev/null 2>&1 || docker network create kaderblick-net
            docker volume inspect kaderblick-data    >/dev/null 2>&1 || docker volume create kaderblick-data
            docker volume inspect kaderblick-db-data >/dev/null 2>&1 || docker volume create kaderblick-db-data
            if docker ps --filter "name=kaderblick-db" --filter "status=running" | grep -q kaderblick-db; then
              echo "DB läuft bereits."
            else
              COMPOSE_DIR="${{ secrets.MAIN_PROJECT_PATH }}/production_current"
              [ -d "$COMPOSE_DIR" ] || COMPOSE_DIR="${{ steps.release.outputs.prod_dir }}"
              docker compose -f "$COMPOSE_DIR/docker-compose.db.yml" -p kaderblick-db up -d db
              until docker exec kaderblick-db mysqladmin ping -uroot -proot --silent 2>/dev/null; do sleep 3; done
              echo "DB bereit."
            fi

      - name: Update maintenance container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mastercad --password-stdin
            docker pull ghcr.io/mastercad/kaderblick/maintenance:${{ inputs.image_tag || github.sha }}
            IMAGE_TAG=${{ inputs.image_tag || github.sha }} docker compose \
              -f "${{ steps.release.outputs.prod_dir }}/docker-compose.maintenance.yml" \
              -p maintenance up -d --no-build --force-recreate

      # ============================================================
      # PRODUCTION DEPLOYMENT
      # ============================================================

      - name: Enable production maintenance
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            touch "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_production.flag"
            chmod 644 "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_production.flag"

      - name: Set production_current symlink
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            PROD_CURRENT="${{ secrets.MAIN_PROJECT_PATH }}/production_current"
            readlink "$PROD_CURRENT" 2>/dev/null > "${{ secrets.MAIN_PROJECT_PATH }}/.rollback_to" || echo "" > "${{ secrets.MAIN_PROJECT_PATH }}/.rollback_to"
            ln -sfn "${{ steps.release.outputs.prod_dir }}" "$PROD_CURRENT"
            mkdir -p "$PROD_CURRENT/api/var/cache" "$PROD_CURRENT/api/var/log"

      - name: Deploy production containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            cd "${{ secrets.MAIN_PROJECT_PATH }}/production_current"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mastercad --password-stdin
            docker pull ghcr.io/mastercad/kaderblick/api:${{ inputs.image_tag || github.sha }}
            docker pull ghcr.io/mastercad/kaderblick/frontend-prod:${{ inputs.image_tag || github.sha }}
            docker compose -f docker-compose.yml -p production down --remove-orphans api frontend 2>/dev/null || true
            IMAGE_TAG=${{ inputs.image_tag || github.sha }} API_IMAGE_TAG=${{ inputs.image_tag || github.sha }} \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" XDEBUG_MODE=off \
            HOST_UID=$(id -u kaderblick-ftp-admin) HOST_GID=$(id -g kaderblick-ftp-admin) \
            docker compose -f docker-compose.yml -p production up -d --no-build --force-recreate api frontend
            mkdir -p api/var

      - name: Production setup (secrets / cache / migrations / JWT)
        uses: ./.github/actions/symfony-app-setup
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          env: prod
          compose_project: production
          compose_files: "-f docker-compose.yml"
          work_dir: ${{ secrets.MAIN_PROJECT_PATH }}/production_current
          main_project_path: ${{ secrets.MAIN_PROJECT_PATH }}

      - name: Load master fixtures on production
        uses: ./.github/actions/symfony-load-fixtures
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          env: prod
          compose_project: production
          compose_files: "-f docker-compose.yml"
          work_dir: ${{ secrets.MAIN_PROJECT_PATH }}/production_current

      - name: Production healthcheck
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            for i in $(seq 1 12); do
              HTTP=$(curl -s -o /tmp/hc_body.txt -w "%{http_code}" http://localhost:8081/api/health 2>/dev/null || echo "000")
              if [ "$HTTP" = "200" ]; then echo "Production bereit (HTTP 200)."; cat /tmp/hc_body.txt; exit 0; fi
              [ "$i" -eq 12 ] && { echo "FEHLER: API nicht bereit nach 60s (HTTP $HTTP)"; cat /tmp/hc_body.txt; docker compose -p production logs --tail=30 api; exit 1; }
              echo "Warte... ($i/12, HTTP $HTTP)"; sleep 5
            done

      - name: Disable production maintenance
        if: always()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            rm -f "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_production.flag"
            rm -f "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_staging.flag"

      # ============================================================
      # STAGING DEPLOYMENT (nach erfolgreichem Production-Healthcheck)
      # ============================================================

      - name: Clone production DB to staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            docker exec kaderblick-db mysql -uroot -proot -e "DROP DATABASE IF EXISTS kaderblick_staging;"
            docker exec kaderblick-db mysql -uroot -proot -e "CREATE DATABASE kaderblick_staging CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
            docker exec kaderblick-db mysql -uroot -proot -e "GRANT ALL PRIVILEGES ON kaderblick_staging.* TO 'kaderblick'@'%'; FLUSH PRIVILEGES;"
            docker exec kaderblick-db sh -c "mysqldump -uroot -proot --single-transaction --quick kaderblick | mysql -uroot -proot kaderblick_staging"
            echo "DB-Klon abgeschlossen."

      - name: Enable staging maintenance
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            touch "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_staging.flag"
            chmod 644 "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_staging.flag"

      - name: Set staging_current symlink
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            ln -sfn "${{ steps.release.outputs.staging_dir }}" "${{ secrets.MAIN_PROJECT_PATH }}/staging_current"
            mkdir -p "${{ secrets.MAIN_PROJECT_PATH }}/staging_current/api/var/cache" \
                     "${{ secrets.MAIN_PROJECT_PATH }}/staging_current/api/var/log"

      - name: Deploy staging containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            cd "${{ secrets.MAIN_PROJECT_PATH }}/staging_current"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mastercad --password-stdin
            docker pull ghcr.io/mastercad/kaderblick/api:${{ inputs.image_tag || github.sha }}
            docker pull ghcr.io/mastercad/kaderblick/frontend-staging:${{ inputs.image_tag || github.sha }}
            docker compose -f docker-compose.yml -f docker-compose.staging.yml -p staging \
              down --remove-orphans api frontend 2>/dev/null || true
            STAGING_DB_URL=$(echo "${{ secrets.DATABASE_URL }}" | sed 's|3306/kaderblick|3306/kaderblick_staging|')
            IMAGE_TAG=${{ inputs.image_tag || github.sha }} API_IMAGE_TAG=${{ inputs.image_tag || github.sha }} DATABASE_URL="$STAGING_DB_URL" XDEBUG_MODE=off \
            PMA_PORT=18082 API_PORT=18081 REACT_PORT=18080 \
            HOST_UID=$(id -u kaderblick-ftp-admin) HOST_GID=$(id -g kaderblick-ftp-admin) \
            docker compose -f docker-compose.yml -f docker-compose.staging.yml -p staging \
              up -d --no-build --force-recreate api frontend
            mkdir -p api/var

      - name: Staging setup (secrets / cache / migrations / JWT)
        uses: ./.github/actions/symfony-app-setup
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          env: staging
          compose_project: staging
          compose_files: "-f docker-compose.yml -f docker-compose.staging.yml"
          work_dir: ${{ secrets.MAIN_PROJECT_PATH }}/staging_current
          main_project_path: ${{ secrets.MAIN_PROJECT_PATH }}

      - name: Load master fixtures on staging
        uses: ./.github/actions/symfony-load-fixtures
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          env: staging
          compose_project: staging
          compose_files: "-f docker-compose.yml -f docker-compose.staging.yml"
          work_dir: ${{ secrets.MAIN_PROJECT_PATH }}/staging_current

      - name: Disable staging maintenance
        if: always()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            rm -f "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_staging.flag"

      # ============================================================
      # NACH ERFOLGREICHEM DEPLOY: :latest Tag in GHCR setzen
      # ============================================================

      - name: Login to GHCR
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Retag SHA → latest
        if: success()
        run: |
          TAG="${{ inputs.image_tag || github.sha }}"
          for IMAGE in api frontend-prod frontend-staging maintenance; do
            docker pull ghcr.io/mastercad/kaderblick/${IMAGE}:${TAG}
            docker tag  ghcr.io/mastercad/kaderblick/${IMAGE}:${TAG} ghcr.io/mastercad/kaderblick/${IMAGE}:latest
            docker push ghcr.io/mastercad/kaderblick/${IMAGE}:latest
          done

      # ============================================================
      # FEHLERBEHANDLUNG & CLEANUP
      # ============================================================

      - name: Rollback production on failure
        if: failure()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            OLD=$(cat "${{ secrets.MAIN_PROJECT_PATH }}/.rollback_to" 2>/dev/null || echo "")
            if [ -n "$OLD" ] && [ -d "$OLD" ]; then
              echo "Rollback auf $OLD ..."
              docker compose -p production down --remove-orphans api frontend 2>/dev/null || true
              ln -sfn "$OLD" "${{ secrets.MAIN_PROJECT_PATH }}/production_current"
              cd "$OLD"
              IMAGE_TAG=latest API_IMAGE_TAG=latest DATABASE_URL="${{ secrets.DATABASE_URL }}" XDEBUG_MODE=off \
              docker compose -f docker-compose.yml -p production up -d --no-build --force-recreate api frontend 2>/dev/null || true
              echo "Rollback auf $OLD abgeschlossen."
            else
              echo "Kein Rollback-Ziel vorhanden."
            fi
            rm -f "${{ secrets.MAIN_PROJECT_PATH }}/.rollback_to"

      - name: Cleanup old releases
        if: always()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            BASE="${{ secrets.MAIN_PROJECT_PATH }}"
            [ -d "$BASE/production_releases" ] && cd "$BASE/production_releases" && ls -1dt * | tail -n +4 | xargs -r rm -rf
            [ -d "$BASE/staging_releases" ]    && cd "$BASE/staging_releases"    && ls -1dt * | tail -n +4 | xargs -r rm -rf
