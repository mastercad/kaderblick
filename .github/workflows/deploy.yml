name: Deploy to Alfahosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
#  quality-assurance:
#    uses: ./.github/workflows/qa.yml
#    secrets: inherit
#    permissions:
#      contents: read
#      pull-requests: write

  deployment:
    runs-on: ubuntu-latest
#    needs: quality-assurance
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      # ------------------------------
      # Checkout repository
      # ------------------------------
      - uses: actions/checkout@v4

      # ------------------------------
      # Login to GitHub Container Registry (GHCR)
      # ------------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ------------------------------
      # Build-Metadaten vorbereiten (Publish-Datum, Build-Info)
      # Muss vor dem Docker-Build laufen, damit die Änderungen ins Image eingebettet werden.
      # ------------------------------
      - name: Prepare build metadata
        run: |
          sh ./frontend/scripts/set-publish-date.sh
          sh ./frontend/scripts/write-buildinfo.sh

      # ------------------------------
      # Erkennen welche Bereiche sich geändert haben.
      # Bei unveränderten Images wird nur das bestehende 'latest'-Image
      # mit dem neuen SHA neu getaggt (pull → retag → push) statt neu gebaut.
      # ------------------------------
      - name: Detect changed paths
        id: changes
        run: |
          git fetch --depth=2 origin
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^(api/|\.docker/api/)'; then
            echo "api_changed=true" >> $GITHUB_OUTPUT
          else
            echo "api_changed=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE '^(frontend/|\.docker/frontend/)'; then
            echo "frontend_changed=true" >> $GITHUB_OUTPUT
          else
            echo "frontend_changed=false" >> $GITHUB_OUTPUT
          fi

      # ------------------------------
      # Docker Images in CI bauen und nach GHCR pushen
      # API: Source-Code + vendor/ (composer install) eingebettet – kein Build mehr auf dem Server
      # frontend-prod:    VITE_BACKEND_URL=https://api.kaderblick.de eingebettet
      # frontend-staging: VITE_BACKEND_URL=https://staging-api.kaderblick.de eingebettet
      # Bei unverändertem Bereich: 'latest' neu taggen statt neu bauen (~Sekunden statt Minuten).
      # ------------------------------
      - name: Build and push API image
        run: |
          if [ "${{ steps.changes.outputs.api_changed }}" = "true" ]; then
            echo "API hat sich geändert – baue neu..."
            BUILD_API=true
          elif docker pull ghcr.io/mastercad/kaderblick/api:latest 2>/dev/null; then
            echo "API unverändert – tagge 'latest' als ${{ github.sha }}..."
            docker tag ghcr.io/mastercad/kaderblick/api:latest ghcr.io/mastercad/kaderblick/api:${{ github.sha }}
            docker push ghcr.io/mastercad/kaderblick/api:${{ github.sha }}
            BUILD_API=false
          else
            echo "API 'latest' nicht gefunden – baue erstmalig..."
            BUILD_API=true
          fi
          if [ "$BUILD_API" = "true" ]; then
            docker build \
              -f .docker/api/Dockerfile \
              -t ghcr.io/mastercad/kaderblick/api:${{ github.sha }} \
              -t ghcr.io/mastercad/kaderblick/api:latest \
              .
            docker push ghcr.io/mastercad/kaderblick/api:${{ github.sha }}
            docker push ghcr.io/mastercad/kaderblick/api:latest
          fi

      - name: Build and push frontend production image
        run: |
          if [ "${{ steps.changes.outputs.frontend_changed }}" = "true" ]; then
            echo "Frontend hat sich geändert – baue neu..."
            BUILD_FRONTEND_PROD=true
          elif docker pull ghcr.io/mastercad/kaderblick/frontend-prod:latest 2>/dev/null; then
            echo "Frontend unverändert – tagge 'latest' als ${{ github.sha }}..."
            docker tag ghcr.io/mastercad/kaderblick/frontend-prod:latest ghcr.io/mastercad/kaderblick/frontend-prod:${{ github.sha }}
            docker push ghcr.io/mastercad/kaderblick/frontend-prod:${{ github.sha }}
            BUILD_FRONTEND_PROD=false
          else
            echo "Frontend-prod 'latest' nicht gefunden – baue erstmalig..."
            BUILD_FRONTEND_PROD=true
          fi
          if [ "$BUILD_FRONTEND_PROD" = "true" ]; then
            echo "VITE_BACKEND_URL=https://api.kaderblick.de" > frontend/.env
            docker build \
              -f .docker/frontend/Dockerfile \
              -t ghcr.io/mastercad/kaderblick/frontend-prod:${{ github.sha }} \
              -t ghcr.io/mastercad/kaderblick/frontend-prod:latest \
              .
            docker push ghcr.io/mastercad/kaderblick/frontend-prod:${{ github.sha }}
            docker push ghcr.io/mastercad/kaderblick/frontend-prod:latest
          fi

      - name: Build and push frontend staging image
        run: |
          if [ "${{ steps.changes.outputs.frontend_changed }}" = "true" ]; then
            echo "Frontend hat sich geändert – baue neu..."
            BUILD_FRONTEND_STAGING=true
          elif docker pull ghcr.io/mastercad/kaderblick/frontend-staging:latest 2>/dev/null; then
            echo "Frontend unverändert – tagge 'latest' als ${{ github.sha }}..."
            docker tag ghcr.io/mastercad/kaderblick/frontend-staging:latest ghcr.io/mastercad/kaderblick/frontend-staging:${{ github.sha }}
            docker push ghcr.io/mastercad/kaderblick/frontend-staging:${{ github.sha }}
            BUILD_FRONTEND_STAGING=false
          else
            echo "Frontend-staging 'latest' nicht gefunden – baue erstmalig..."
            BUILD_FRONTEND_STAGING=true
          fi
          if [ "$BUILD_FRONTEND_STAGING" = "true" ]; then
            echo "VITE_BACKEND_URL=https://staging-api.kaderblick.de" > frontend/.env
            docker build \
              -f .docker/frontend/Dockerfile \
              -t ghcr.io/mastercad/kaderblick/frontend-staging:${{ github.sha }} \
              -t ghcr.io/mastercad/kaderblick/frontend-staging:latest \
              .
            docker push ghcr.io/mastercad/kaderblick/frontend-staging:${{ github.sha }}
            docker push ghcr.io/mastercad/kaderblick/frontend-staging:latest
            rm -f frontend/.env
          fi

      # ------------------------------
      # Enable staging maintenance mode
      # Ab jetzt leitet Nginx Anfragen auf staging.kaderblick.de / staging-api
      # auf den Maintenance-Container um. Wird nach dem Staging-Deploy wieder entfernt.
      # ------------------------------
      - name: Enable staging maintenance
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            touch "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_staging.flag"
            chmod 644 "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_staging.flag"
            echo "Staging-Maintenance aktiviert."

      # ------------------------------
      # Generate release directory names (Production & Staging)
      # Gleicher Timestamp → leicht zuzuordnen
      # ------------------------------
      - name: Generate release directory names
        id: release
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          echo "prod_dir=${{ secrets.MAIN_PROJECT_PATH }}/production_releases/$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "staging_dir=${{ secrets.MAIN_PROJECT_PATH }}/staging_releases/$TIMESTAMP" >> $GITHUB_OUTPUT

      # ------------------------------
      # Prepare build files
      # ------------------------------
      - name: Prepare files
        run: |
          mkdir -p build
          cp -r docker-compose.yml docker-compose.staging.yml docker-compose.db.yml docker-compose.maintenance.yml .docker api frontend build/

      # ------------------------------
      # Create release directories on server
      # ------------------------------
      - name: Create release directories on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            mkdir -p "${{ steps.release.outputs.prod_dir }}"
            chmod 755 "${{ steps.release.outputs.prod_dir }}"
            chown -R ${{ secrets.PLESK_USERNAME }}:psacln "${{ steps.release.outputs.prod_dir }}"

      # ------------------------------
      # Copy build files to production release directory
      # ------------------------------
      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USERNAME }}
          password: ${{ secrets.PLESK_PASSWORD }}
          source: "build/*"
          target: "${{ steps.release.outputs.prod_dir }}"
          strip_components: 1

      # ------------------------------
      # Copy production release → staging release directory
      # ------------------------------
      - name: Create staging release directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            mkdir -p "${{ secrets.MAIN_PROJECT_PATH }}/staging_releases"
            cp -r "${{ steps.release.outputs.prod_dir }}" "${{ steps.release.outputs.staging_dir }}"
            chmod 755 "${{ steps.release.outputs.staging_dir }}"
            chown -R ${{ secrets.PLESK_USERNAME }}:psacln "${{ steps.release.outputs.staging_dir }}"

      # ------------------------------
      # Deploy secrets & JWT keys (Production und Staging)
      # ------------------------------
      - name: Deploy secrets & JWT
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            PROD_DIR="${{ steps.release.outputs.prod_dir }}"
            STAGING_DIR="${{ steps.release.outputs.staging_dir }}"
            ROOT_DIR="${{ secrets.MAIN_PROJECT_PATH }}"

            for DIR in "$PROD_DIR" "$STAGING_DIR"; do
              mkdir -p "$DIR/api/config/secrets/prod"
              mkdir -p "$DIR/api/config/jwt"

              if [ -d "$ROOT_DIR/api/config/jwt" ]; then
                cp -r "$ROOT_DIR/api/config/jwt/"* "$DIR/api/config/jwt/" 2>/dev/null || true
              fi

              chmod -R 755 "$DIR/api" "$DIR/frontend"
              chown -R kaderblick-ftp-admin:psacln "$DIR"
            done

      # ------------------------------
      # Ensure DB container is running
      # ------------------------------
      - name: Ensure DB container is running
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            docker network inspect kaderblick-net >/dev/null 2>&1 || docker network create kaderblick-net
            docker volume inspect kaderblick-data >/dev/null 2>&1 || docker volume create kaderblick-data
            docker volume inspect kaderblick-db-data >/dev/null 2>&1 || docker volume create kaderblick-db-data

            if docker ps --filter "name=kaderblick-db" --filter "status=running" | grep -q kaderblick-db; then
              echo "DB-Container läuft bereits."
            else
              echo "Starte DB-Container..."
              COMPOSE_DIR="${{ secrets.MAIN_PROJECT_PATH }}/production_current"
              [ -d "$COMPOSE_DIR" ] || COMPOSE_DIR="${{ steps.release.outputs.prod_dir }}"
              docker compose -f "$COMPOSE_DIR/docker-compose.db.yml" -p production up -d db
              echo "Warte auf DB-Bereitschaft..."
              until docker exec kaderblick-db mysqladmin ping -uroot -proot --silent 2>/dev/null; do sleep 3; done
            fi

      # ------------------------------
      # Rebuild & restart maintenance container
      # Bei jedem Deployment neu bauen, damit Änderungen an nginx.conf
      # oder maintenance.html sofort übernommen werden.
      # Plesk-Nginx leitet bei Maintenance-Flag auf Port 8083 um.
      # ------------------------------
      - name: Rebuild maintenance container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            # Immer das frisch hochgeladene Release-Verzeichnis verwenden,
            # da production_current noch auf ein altes Release zeigen kann,
            # das docker-compose.maintenance.yml noch nicht enthält.
            COMPOSE_DIR="${{ steps.release.outputs.prod_dir }}"
            cd "$COMPOSE_DIR"
            echo "Baue Maintenance-Container neu..."
            docker compose -f docker-compose.maintenance.yml -p maintenance up -d --build --force-recreate
            echo "Maintenance-Container neu gestartet."

      # ------------------------------
      # Prepare .env files (Production und Staging)
      # DATABASE_URL wird nicht in .env geschrieben – wird als Docker-Env-Variable übergeben
      # ------------------------------
      - name: Prepare .env files
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            PROD_DIR="${{ steps.release.outputs.prod_dir }}"
            STAGING_DIR="${{ steps.release.outputs.staging_dir }}"

            # Production
            # APP_ENV/APP_DEBUG direkt in .env
            cp "$PROD_DIR/api/.env.dist" "$PROD_DIR/api/.env"
            sed -i 's/^APP_ENV=.*$/APP_ENV=prod/' "$PROD_DIR/api/.env"
            echo "APP_DEBUG=0" >> "$PROD_DIR/api/.env"
            printf "APP_SECRET=${{ secrets.APP_SECRET }}\n" >> "$PROD_DIR/api/.env"

            # Secrets in .env.prod.local
            mkdir -p "$PROD_DIR/api/config/secrets/prod"
            echo '${{ secrets.PROD_DECRYPT_KEY }}' | base64 -d > "$PROD_DIR/api/config/secrets/prod/prod.decrypt.private.php"
            chmod 655 "$PROD_DIR/api/config/secrets/prod/prod.decrypt.private.php"
            echo "VITE_BACKEND_URL=https://api.kaderblick.de" > "$PROD_DIR/frontend/.env"

            # Staging 
            # APP_ENV/APP_DEBUG direkt in .env
            cp "$STAGING_DIR/api/.env.dist" "$STAGING_DIR/api/.env"
            sed -i 's/^APP_ENV=.*$/APP_ENV=staging/' "$STAGING_DIR/api/.env"
            sed -i 's|^GOOGLE_REDIRECT_URI=.*$|GOOGLE_REDIRECT_URI=https://staging.kaderblick.de/oauth2callback|' "$STAGING_DIR/api/.env"
            sed -i 's|^FRONTEND_URL=.*$|FRONTEND_URL=https://staging.kaderblick.de|' "$STAGING_DIR/api/.env"
            echo "APP_DEBUG=0" >> "$STAGING_DIR/api/.env"
            printf "APP_SECRET=${{ secrets.APP_SECRET }}\n" >> "$STAGING_DIR/api/.env"

            # Secrets in .env.staging.local
            mkdir -p "$STAGING_DIR/api/config/secrets/staging"
            echo '${{ secrets.STAGING_DECRYPT_KEY }}' | base64 -d > "$STAGING_DIR/api/config/secrets/staging/staging.decrypt.private.php"
            chmod 655 "$STAGING_DIR/api/config/secrets/staging/staging.decrypt.private.php"
            echo "VITE_BACKEND_URL=https://staging-api.kaderblick.de" > "$STAGING_DIR/frontend/.env"

      # ------------------------------
      # Clone production DB → kaderblick_staging
      # Container: kaderblick-db, Credentials: root/root
      # ------------------------------
      - name: Clone production DB to staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e

            echo "Lösche kaderblick_staging (falls vorhanden)..."
            docker exec kaderblick-db mysql -uroot -proot \
              -e "DROP DATABASE IF EXISTS kaderblick_staging;"

            echo "Erstelle kaderblick_staging..."
            docker exec kaderblick-db mysql -uroot -proot \
              -e "CREATE DATABASE kaderblick_staging CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

            echo "Vergebe Rechte für kaderblick-User..."
            docker exec kaderblick-db mysql -uroot -proot \
              -e "GRANT ALL PRIVILEGES ON kaderblick_staging.* TO 'kaderblick'@'%'; FLUSH PRIVILEGES;"

            echo "Kopiere kaderblick → kaderblick_staging..."
            docker exec kaderblick-db sh -c \
              "mysqldump -uroot -proot --single-transaction --quick kaderblick | mysql -uroot -proot kaderblick_staging"

            echo "DB-Klon abgeschlossen."

      # ------------------------------
      # Set staging_current symlink
      # ------------------------------
      - name: Set staging_current symlink
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            ln -sfn "${{ steps.release.outputs.staging_dir }}" "${{ secrets.MAIN_PROJECT_PATH }}/staging_current"
            mkdir -p "${{ secrets.MAIN_PROJECT_PATH }}/staging_current/api/var/cache" \
                     "${{ secrets.MAIN_PROJECT_PATH }}/staging_current/api/var/log"

      # ------------------------------
      # Deploy Staging containers (persistent)
      # Ports: 18080 (frontend) / 18081 (api)
      # Eigenes var/-Volume via docker-compose.staging.yml
      # DATABASE_URL: kaderblick_staging (aus production-URL abgeleitet)
      # ------------------------------
      - name: Deploy Staging containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            STAGING_CURRENT="${{ secrets.MAIN_PROJECT_PATH }}/staging_current"
            cd "$STAGING_CURRENT"

            # Staging-DATABASE_URL: Datenbankname kaderblick → kaderblick_staging
            STAGING_DB_URL=$(echo "${{ secrets.DATABASE_URL }}" | sed 's|3306/kaderblick|3306/kaderblick_staging|')

            # GHCR-Login auf Server (GHCR_TOKEN = GitHub PAT mit 'read:packages'-Scope)
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mastercad --password-stdin

            docker pull ghcr.io/mastercad/kaderblick/api:${{ github.sha }}
            docker pull ghcr.io/mastercad/kaderblick/frontend-staging:${{ github.sha }}

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.staging.yml \
              -p staging \
              down --remove-orphans api frontend 2>/dev/null || true

            IMAGE_TAG=${{ github.sha }} \
            DATABASE_URL="$STAGING_DB_URL" XDEBUG_MODE=off \
            PMA_PORT=18082 API_PORT=18081 REACT_PORT=18080 \
            HOST_UID=$(id -u kaderblick-ftp-admin) HOST_GID=$(id -g kaderblick-ftp-admin) \
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.staging.yml \
              -p staging \
              up -d --no-build --force-recreate api frontend

            mkdir -p "$STAGING_CURRENT/api/var"

      # ------------------------------
      # Staging: Composer, Migrations, Secrets, JWT
      # ------------------------------
      - name: Staging setup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            cd "${{ secrets.MAIN_PROJECT_PATH }}/staging_current"

            # Secrets zuerst entschlüsseln, damit cache:warmup alle Env-Werte kennt
            # composer install entfällt – vendor/ ist bereits im GHCR-Image enthalten
            docker compose -f docker-compose.yml -f docker-compose.staging.yml -p staging \
              exec -T --user www-data api bin/console secrets:decrypt-to-local --force --env=staging

            docker compose -f docker-compose.yml -f docker-compose.staging.yml -p staging \
              exec -T --user www-data api bin/console cache:warmup --env=staging

            docker compose -f docker-compose.yml -f docker-compose.staging.yml -p staging \
              exec -T --user www-data api bin/console doctrine:migrations:migrate --no-interaction --env=staging

            # JWT-Keys: PKCS#1-Format (BEGIN RSA PRIVATE KEY) ist nicht kompatibel mit OpenSSL 3.x
            if [ ! -f api/config/jwt/private.pem ] || ! grep -q "BEGIN PRIVATE KEY" api/config/jwt/private.pem; then
              echo "JWT-Keys fehlen oder im PKCS#1-Format – regeneriere als PKCS#8..."
              docker compose -f docker-compose.yml -f docker-compose.staging.yml -p staging \
                exec -T --user www-data api php bin/console lexik:jwt:generate-keypair --overwrite
            fi

      # ------------------------------
      # Staging: Load fixtures (auf kaderblick_staging)
      # ------------------------------
      - name: Load fixtures on staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            cd "${{ secrets.MAIN_PROJECT_PATH }}/staging_current"

            docker compose -f docker-compose.yml -f docker-compose.staging.yml -p staging \
              exec -T api env APP_ENV=dev composer install

            docker compose -f docker-compose.yml -f docker-compose.staging.yml -p staging \
              exec -T --user www-data api bin/console doctrine:fixtures:load --env=dev --no-interaction --append --group=master

            docker compose -f docker-compose.yml -f docker-compose.staging.yml -p staging \
              exec -T api composer install --no-dev --optimize-autoloader

            # Cache nach Dev-Reinstall neu aufbauen
            docker compose -f docker-compose.yml -f docker-compose.staging.yml -p staging \
              exec -T --user www-data api bin/console cache:warmup --env=staging

      # ------------------------------
      # Disable staging maintenance mode
      # Staging ist ab hier wieder erreichbar – Production wird noch nicht angefasst.
      # ------------------------------
      - name: Disable staging maintenance
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            rm -f "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_staging.flag"
            echo "Staging-Maintenance deaktiviert."

      # ------------------------------
      # Prepare shared uploads symlinks (Production und Staging)
      # ------------------------------
      - name: Prepare uploads symlinks
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            PROD_DIR="${{ steps.release.outputs.prod_dir }}"
            STAGING_DIR="${{ steps.release.outputs.staging_dir }}"
            SHARED_UPLOADS="${{ secrets.MAIN_PROJECT_PATH }}/public/uploads"

            mkdir -p "$SHARED_UPLOADS"
            chown -R www-data:www-data "$SHARED_UPLOADS"
            chmod -R 775 "$SHARED_UPLOADS"

            for DIR in "$PROD_DIR" "$STAGING_DIR"; do
              mkdir -p "$DIR/public"
              rm -rf "$DIR/public/uploads"
              ln -s "$SHARED_UPLOADS" "$DIR/public/uploads"
            done

      # ------------------------------
      # Enable production maintenance mode
      # Ab jetzt leitet Nginx Anfragen auf kaderblick.de / api.kaderblick.de
      # auf den Maintenance-Container um. Wird am Ende (if: always()) wieder entfernt.
      # ------------------------------
      - name: Enable production maintenance
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            touch "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_production.flag"
            chmod 644 "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_production.flag"
            echo "Production-Maintenance aktiviert."

      # ------------------------------
      # Set production_current symlink
      # Speichert das alte Release-Verzeichnis für einen möglichen Rollback.
      # HINWEIS: DB-Migrations lassen sich nicht automatisch rollbacken!
      # ------------------------------
      - name: Set production_current symlink
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            PROD_CURRENT="${{ secrets.MAIN_PROJECT_PATH }}/production_current"
            NEW_PROD="${{ steps.release.outputs.prod_dir }}"

            # Altes Release merken (für Rollback)
            OLD_PROD=$(readlink "$PROD_CURRENT" 2>/dev/null || echo "")
            echo "$OLD_PROD" > "${{ secrets.MAIN_PROJECT_PATH }}/.rollback_to"

            ln -sfn "$NEW_PROD" "$PROD_CURRENT"
            mkdir -p "$PROD_CURRENT/api/var/cache" \
                     "$PROD_CURRENT/api/var/log"

      # ------------------------------
      # Deploy Production containers (persistent)
      # Ports: 8080 (frontend) / 8081 (api)
      # Images werden aus GHCR gepullt – kein docker build mehr auf dem Server.
      # VITE_BACKEND_URL ist bereits zur CI-Build-Zeit im frontend-prod-Image eingebettet.
      # ------------------------------
      - name: Deploy Production containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            PROD_CURRENT="${{ secrets.MAIN_PROJECT_PATH }}/production_current"
            cd "$PROD_CURRENT"

            # GHCR-Login auf Server (GHCR_TOKEN = GitHub PAT mit 'read:packages'-Scope)
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mastercad --password-stdin

            docker pull ghcr.io/mastercad/kaderblick/api:${{ github.sha }}
            docker pull ghcr.io/mastercad/kaderblick/frontend-prod:${{ github.sha }}

            docker compose -f docker-compose.yml -p production down --remove-orphans api frontend 2>/dev/null || true

            HOST_UID=$(id -u kaderblick-ftp-admin)
            HOST_GID=$(id -g kaderblick-ftp-admin)
            IMAGE_TAG=${{ github.sha }} \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" XDEBUG_MODE=off \
            HOST_UID="$HOST_UID" HOST_GID="$HOST_GID" \
            docker compose -f docker-compose.yml -p production up -d --no-build --force-recreate api frontend

            mkdir -p "$PROD_CURRENT/api/var"

      # ------------------------------
      # Production setup: Composer, Migrations, Secrets, JWT
      # ------------------------------
      - name: Production setup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            cd "${{ secrets.MAIN_PROJECT_PATH }}/production_current"

            # Secrets zuerst entschlüsseln, damit cache:warmup alle Env-Werte kennt
            # composer install entfällt – vendor/ ist bereits im GHCR-Image enthalten
            docker compose -f docker-compose.yml -p production exec -T --user www-data api \
              bin/console secrets:decrypt-to-local --force --env=prod

            docker compose -f docker-compose.yml -p production exec -T --user www-data api \
              bin/console cache:warmup --env=prod

            docker compose -f docker-compose.yml -p production exec -T --user www-data api \
              bin/console doctrine:migrations:migrate --no-interaction --env=prod

            # JWT-Keys: PKCS#1-Format (BEGIN RSA PRIVATE KEY) ist nicht kompatibel mit OpenSSL 3.x
            # Bei fehlendem oder veraltetem Format: neue PKCS#8-Keys generieren und persistent speichern
            if [ ! -f api/config/jwt/private.pem ] || ! grep -q "BEGIN PRIVATE KEY" api/config/jwt/private.pem; then
              echo "JWT-Keys fehlen oder im PKCS#1-Format – regeneriere als PKCS#8..."
              docker compose -f docker-compose.yml -p production exec -T --user www-data api \
                php bin/console lexik:jwt:generate-keypair --overwrite
              # Neue PKCS#8-Keys persistent im ROOT_DIR ablegen → wird beim nächsten Deploy kopiert
              mkdir -p "${{ secrets.MAIN_PROJECT_PATH }}/api/config/jwt"
              cp api/config/jwt/private.pem "${{ secrets.MAIN_PROJECT_PATH }}/api/config/jwt/private.pem" || true
              cp api/config/jwt/public.pem "${{ secrets.MAIN_PROJECT_PATH }}/api/config/jwt/public.pem" || true
            fi

      # ------------------------------
      # Production: Load fixtures (auf kaderblick)
      # ------------------------------
      - name: Load fixtures on production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            cd "${{ secrets.MAIN_PROJECT_PATH }}/production_current"

            docker compose -f docker-compose.yml -p production \
              exec -T api env APP_ENV=dev composer install

            docker compose -f docker-compose.yml -p production \
              exec -T --user www-data api bin/console doctrine:fixtures:load --env=dev --no-interaction --append --group=master

            docker compose -f docker-compose.yml -p production \
              exec -T api composer install --no-dev --optimize-autoloader

            # Cache nach Dev-Reinstall neu aufbauen
            docker compose -f docker-compose.yml -p production \
              exec -T --user www-data api bin/console cache:warmup --env=prod

      # ------------------------------
      # Production healthcheck
      # Curl vom Host auf den exponierten API-Port – prüft ob der Container
      # von außen erreichbar ist und ein valides JSON zurückgibt.
      # ------------------------------
      - name: Production healthcheck
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            set -e
            echo "Warte auf API-Bereitschaft..."
            for i in $(seq 1 12); do
              RESPONSE=$(curl -s -o /tmp/healthcheck_body.txt -w "%{http_code}" \
                http://localhost:8081/api/health 2>/dev/null || echo "000")
              HTTP_CODE="$RESPONSE"
              if [ "$HTTP_CODE" = "200" ]; then
                echo "API antwortet mit HTTP 200 – Deployment erfolgreich."
                cat /tmp/healthcheck_body.txt
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "FEHLER: API antwortet nach 60s nicht korrekt (HTTP $HTTP_CODE)" >&2
                echo "--- Response Body ---"
                cat /tmp/healthcheck_body.txt 2>/dev/null || true
                echo "--- Symfony prod.log (letzte 30 Zeilen) ---"
                docker compose -p production logs --tail=30 api 2>/dev/null || true
                exit 1
              fi
              echo "Warte... ($i/12, HTTP $HTTP_CODE)"
              sleep 5
            done

      # ------------------------------
      # Rollback Production
      # Läuft nur bei Fehler in vorherigen Steps – stellt das letzte bekannte Release wieder her.
      # HINWEIS: DB-Migrations lassen sich nicht automatisch rollbacken!
      # ------------------------------
      - name: Rollback Production
        if: failure()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            PROD_CURRENT="${{ secrets.MAIN_PROJECT_PATH }}/production_current"
            OLD_PROD=$(cat "${{ secrets.MAIN_PROJECT_PATH }}/.rollback_to" 2>/dev/null || echo "")

            if [ -n "$OLD_PROD" ] && [ -d "$OLD_PROD" ]; then
              echo "Starte Rollback auf $OLD_PROD ..."
              docker compose -p production down --remove-orphans api frontend 2>/dev/null || true
              ln -sfn "$OLD_PROD" "$PROD_CURRENT"
              cd "$OLD_PROD"
              IMAGE_TAG=latest \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" XDEBUG_MODE=off \
              docker compose -f docker-compose.yml -p production up -d --no-build --force-recreate api frontend 2>/dev/null || true
              echo "Rollback abgeschlossen → $OLD_PROD"
            else
              echo "Kein vorheriges Release zum Rollback vorhanden."
            fi
            rm -f "${{ secrets.MAIN_PROJECT_PATH }}/.rollback_to"

      # ------------------------------
      # Cleanup: alte Releases (letzte 3 behalten, jeweils getrennt)
      # ------------------------------
      - name: Cleanup old releases
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            BASE="${{ secrets.MAIN_PROJECT_PATH }}"

            if [ -d "$BASE/production_releases" ]; then
              cd "$BASE/production_releases" && ls -1dt * | tail -n +4 | xargs -r rm -rf
            fi

            if [ -d "$BASE/staging_releases" ]; then
              cd "$BASE/staging_releases" && ls -1dt * | tail -n +4 | xargs -r rm -rf
            fi

      # ------------------------------
      # Cleanup: alte GHCR-Images (letzte 5 Versionen behalten)
      # 'latest' wird nie gelöscht (untagged=false).
      # Läuft immer – auch bei Fehlern, damit sich keine Altlasten aufbauen.
      # ------------------------------
      - name: Cleanup old GHCR images (api)
        if: always()
        uses: actions/delete-package-versions@v5
        with:
          package-name: kaderblick/api
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: latest

      - name: Cleanup old GHCR images (frontend-prod)
        if: always()
        uses: actions/delete-package-versions@v5
        with:
          package-name: kaderblick/frontend-prod
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: latest

      - name: Cleanup old GHCR images (frontend-staging)
        if: always()
        uses: actions/delete-package-versions@v5
        with:
          package-name: kaderblick/frontend-staging
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: latest

      # ------------------------------
      # Disable production maintenance mode
      # Läuft immer – auch bei Fehlern in vorherigen Steps.
      # Das Staging-Flag wurde bereits nach dem Staging-Deploy entfernt.
      # ------------------------------
      - name: Disable production maintenance
        if: always()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}
          script: |
            rm -f "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_production.flag"
            # Sicherheitshalber auch Staging-Flag entfernen, falls es durch einen Fehler noch existiert
            rm -f "${{ secrets.MAIN_PROJECT_PATH }}/maintenance_staging.flag"
            echo "Production-Maintenance deaktiviert."
