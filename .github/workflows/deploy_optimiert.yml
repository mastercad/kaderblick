name: Deploy Kaderblick

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}/api
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:

  quality-assurance:
    uses: ./.github/workflows/qa.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write


  build-images:
    runs-on: ubuntu-latest
    needs: quality-assurance

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  deploy:
    runs-on: ubuntu-latest
    needs: build-images
    timeout-minutes: 15

    steps:

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.ROOT_USER }}
          password: ${{ secrets.ROOT_PASSWORD }}

          script: |

            set -e

            APP_PATH="${{ secrets.MAIN_PROJECT_PATH }}"

            echo "Login GHCR"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd $APP_PATH

            echo "Enable maintenance"
            touch maintenance_production.flag

            echo "Pull new images"
            docker compose pull

            echo "Restart containers"
            docker compose up -d --remove-orphans

            echo "Wait for API"
            sleep 10

            echo "Run migrations"
            docker compose exec -T api \
              bin/console doctrine:migrations:migrate \
              --no-interaction --env=prod

            echo "Warmup cache"
            docker compose exec -T api \
              bin/console cache:warmup --env=prod

            echo "Healthcheck"
            for i in {1..12}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/api/health || true)

              if [ "$STATUS" = "200" ]; then
                echo "API healthy"
                break
              fi

              if [ "$i" = "12" ]; then
                echo "API healthcheck failed"
                docker compose logs --tail=50 api
                exit 1
              fi

              sleep 5
            done

            echo "Disable maintenance"
            rm -f maintenance_production.flag

            echo "Deployment finished"